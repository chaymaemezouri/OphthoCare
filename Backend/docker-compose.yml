services:
  postgres:
    image: postgres:15-alpine
    container_name: ophthoccare_postgres
    # POSTGRES_* ne s’appliquent qu’à la 1ère création du volume. Pour changer le mot de passe ensuite :
    # docker exec ophthoccare_postgres psql -U ophthoccare -d postgres -c "ALTER USER ophthoccare WITH PASSWORD 'NOUVEAU';"
    environment:
      POSTGRES_USER: ophthoccare
      POSTGRES_PASSWORD: Ch123456
      POSTGRES_DB: ophthoccare_db
    # Port hôte 5434 : évite le conflit avec PostgreSQL installé sur Windows (souvent 5432)
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ophthoccare
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ophthoccare"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ophthoccare_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ophthoccare
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: ophthoccare_adminer
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ophthoccare

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: ophthoccare_redis_commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - ophthoccare

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  ophthoccare:
    driver: bridge
